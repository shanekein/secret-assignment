<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
</head>

<body>

<div class="wrapper">

  <div class="header">
    <div class="title">🔐 Admin Dashboard</div>
    <div class="subtitle">Secret Santa Control Panel</div>
  </div>

  <div class="section">

    <div id="loginBox">
      <label>Enter Admin PIN</label>
      <input type="password" id="adminPin" class="textbox">
      <button onclick="checkPin()">Enter</button>
    </div>

    <div id="dashboard" style="display:none;">

      <h3>Participants</h3>
      <div id="list"></div>

      <button onclick="generateAssignments()">Generate Assignments</button>

      <div id="result"></div>

    </div>

  </div>

</div>

<script>

const ADMIN_PIN = "TALA2026";

// ===============================
// CHECK ADMIN PIN
// ===============================
function checkPin() {
  const pin = document.getElementById("adminPin").value;

  if (pin !== ADMIN_PIN) {
    alert("Wrong PIN!");
    return;
  }

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  loadParticipants();
}

// ===============================
// LOAD PARTICIPANTS
// ===============================
let participants = [];

async function loadParticipants() {
  const snap = await db.collection("participants").get();

  participants = [];

  const list = document.getElementById("list");
  list.innerHTML = "";

  snap.forEach(doc => {
    const data = doc.data();
    participants.push(data);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${data.name}</strong><br>
      Excluded: ${data.excluded ? data.excluded.join(", ") : "None"}
    `;

    list.appendChild(div);
  });
}

// ===============================
// SHUFFLE FUNCTION
// ===============================
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// ===============================
// VALID CHECK
// ===============================
function isValid(giver, receiver, map) {
  if (giver.name === receiver.name) return false;
  if (giver.excluded?.includes(receiver.name)) return false;
  return true;
}

// ===============================
// GENERATE ASSIGNMENTS
// ===============================
async function generateAssignments() {

  let givers = [...participants];
  let receivers = [...participants];

  let result = null;

  for (let attempt = 0; attempt < 200; attempt++) {

    receivers = shuffle([...participants]);
    let used = new Array(participants.length).fill(false);

    let temp = {};

    let ok = true;

    for (let i = 0; i < givers.length; i++) {
      let giver = givers[i];

      let found = false;

      for (let j = 0; j < receivers.length; j++) {

        if (used[j]) continue;

        let receiver = receivers[j];

        if (!isValid(giver, receiver)) continue;

        used[j] = true;
        temp[giver.name] = receiver.name;
        found = true;
        break;
      }

      if (!found) {
        ok = false;
        break;
      }
    }

    if (ok) {
      result = temp;
      break;
    }
  }

  if (!result) {
    document.getElementById("result").innerHTML =
      "<p style='color:red;'>Failed to generate assignments.</p>";
    return;
  }

  // ===============================
  // SAVE TO FIREBASE
  // ===============================
  const batch = db.batch();

  Object.keys(result).forEach(name => {

    const ref = db.collection("assignments").doc(name);

    batch.set(ref, {
      giver: name,
      receiver: result[name]
    });

  });

  await batch.commit();

  // ===============================
  // SHOW LINKS
  // ===============================
  const output = document.getElementById("result");
  output.innerHTML = "";

  Object.keys(result).forEach(name => {

    const encoded = btoa(result[name]);

    const link =
      window.location.origin +
      "/result.html?name=" + encodeURIComponent(name) +
      "&code=" + encoded;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <strong>${name}</strong><br><br>
      <input class="textbox" value="${link}" readonly>
    `;

    output.appendChild(card);
  });

  alert("Assignments generated!");
}

</script>

</body>
</html>
