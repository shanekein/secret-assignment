<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Submit Preferences</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
</head>

<body>

<div class="wrapper">

  <div class="header">
    <div class="title">🎁 Secret Assignment</div>
    <div class="subtitle">Select who you want to exclude</div>
  </div>

  <div class="section">

    <div id="userInfo" style="margin-bottom:10px; color: var(--muted);"></div>

    <div id="checkboxList"></div>

    <button onclick="savePreferences()">Submit Preferences</button>

    <div id="status"></div>

  </div>

</div>

<script>
const friends = [
  "Shane Kein",
  "Kokey",
  "Kia",
  "Ian",
  "Natasha",
  "Angel",
  "Jea",
  "Franz",
  "Connie Kim",
  "Mary Bless",
  "Mary Jane"
];

// ===============================
// GET LOGGED IN USER (TEMP VERSION)
// ===============================
const params = new URLSearchParams(window.location.search);
const currentUser = params.get("name");

if (!currentUser) {
  document.body.innerHTML = "<h2 style='color:white;text-align:center;'>No user detected. Go back to login.</h2>";
}

// Show user
document.getElementById("userInfo").innerText =
  "Logged in as: " + currentUser;

// ===============================
// BUILD CHECKBOXES
// ===============================
const box = document.getElementById("checkboxList");

friends.forEach(name => {
  if (name === currentUser) return;

  const label = document.createElement("label");

  label.innerHTML = `
    <input type="checkbox" value="${name}">
    ${name}
  `;

  box.appendChild(label);
});

// ===============================
// SAVE TO FIREBASE (PER PERSON)
// ===============================
async function savePreferences() {

  const excluded = [];

  document.querySelectorAll("input[type=checkbox]").forEach(cb => {
    if (cb.checked) excluded.push(cb.value);
  });

  await db.collection("participants")
    .doc(currentUser)
    .set({
      name: currentUser,
      excluded: excluded,
      timestamp: Date.now()
    });

  document.getElementById("status").innerHTML =
    "<p style='color:lightgreen;'>✔ Saved successfully!</p>";
}
</script>

</body>
</html>
