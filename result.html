<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">
  <div class="header">
    <div class="title">Secret Result</div>
    <div class="subtitle">Do not share</div>
  </div>

  <div class="section" style="text-align:center;">
    <div style="color:var(--muted)">Give your gift to</div>
    <div id="result" style="font-size:28px;color:var(--accent);margin-top:10px;"></div>
  </div>
</div>

<script>
const p = new URLSearchParams(window.location.search);

const code = p.get("code");

if (!code) {
  document.getElementById("result").innerText = "Invalid link";
} else {
  document.getElementById("result").innerText = atob(code);
}
</script>

</body>
</html>
